<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Bingo PRO Gratis</title>
    <style>
        /* Estilos generales y fondo moderno */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            /* Gradiente oscuro y elegante para resaltar el contenido */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* Contenedor principal estilo tarjeta de cristal (Glassmorphism) */
        .container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            max-width: 400px; 
            width: 90%; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        h1 { font-size: 26px; margin-bottom: 10px; color: #ffffff; line-height: 1.2; }
        p { font-size: 15px; margin-bottom: 25px; color: #b0c4de; }
        
        /* Estilo para la única imagen llamativa */
        .hero-img { 
            width: 100%; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            object-fit: cover;
        }

        /* Estilos del formulario */
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-size: 13px; margin-bottom: 6px; color: #cfd8dc; font-weight: 600; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            outline: none; 
            transition: all 0.3s ease; 
        }
        input:focus { box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.5); background: #ffffff; }

        /* Botón de WhatsApp */
        .btn-submit { 
            background: #25D366; 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 10px; 
            font-size: 17px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.2s, background 0.3s; 
            margin-top: 10px; 
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }
        .btn-submit:hover { background: #20ba56; transform: translateY(-2px); }
        .btn-submit:active { transform: translateY(1px); }
    </style>
</head>
<body>

    <div class="container">
        <h1>¿Quieres probar nuestro software de Bingo sin compromiso?</h1>
        <p>Llena tus datos para recibir tu acceso inmediato y revoluciona tus partidas.</p>
        
        <img src="imapag1.png" alt="Interfaz del Software de Bingo" class="hero-img">
        
        <form id="leadForm">
            <div class="form-group">
                <label for="name">Tu Nombre</label>
                <input type="text" id="name" placeholder="Ej: Carlos Ramírez" required>
            </div>
            <div class="form-group">
                <label for="phone">Tu Teléfono</label>
                <input type="tel" id="phone" placeholder="Ej: 3001234567" required>
            </div>
            <button type="submit" class="btn-submit">Probar Totalmente Gratis</button>
        </form>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue
            
            // Capturar los datos del usuario
            const name = document.getElementById('name').value.trim();
            const userPhone = document.getElementById('phone').value.trim();
            
            // Número de destino (el tuyo)
            const destinationNumber = "573124718450"; 
            
            // Construir el mensaje
            const message = `Hola, mi nombre es ${name} y mi número es ${userPhone}. Quiero probar el software totalmente gratis.`;
            
            // Codificar el texto para que funcione en la URL
            const encodedMessage = encodeURIComponent(message);
            
            // Crear el enlace de WhatsApp
            const whatsappUrl = `https://wa.me/${destinationNumber}?text=${encodedMessage}`;
            
            // Abrir WhatsApp en una nueva pestaña
            window.open(whatsappUrl, '_blank');
        });
    </script>

</body>
</html>
